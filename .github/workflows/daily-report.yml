name: Daily Firebase Report

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Create service account file
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: Build and run
        run: mvn compile exec:java -Dexec.mainClass="com.firebase.report.firebase_report.FirebaseReport"